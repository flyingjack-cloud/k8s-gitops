apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service-v1
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: auth-service
          image: 192.168.31.162:8443/cloud/flyingjack-auth-service:1.0.0-SNAPSHOT
          imagePullPolicy: Always
          ports:
            - containerPort: 5005  # 调试端口
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-Dspring.jvm.enable-preview=true -XX:+EnableDynamicAgentLoading -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
#         需要启动时调试时,替换为下面的参数
#          env:
#            - name: JAVA_TOOL_OPTIONS
#              value: "-Dspring.jvm.enable-preview=true -XX:+EnableDynamicAgentLoading -agentlib:jdwp=transport=dt_socket,server=y,suspend=y,address=*:5005"