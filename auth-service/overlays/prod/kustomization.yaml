namespace: prod

resources:
  - ../../base
  - namespace.yaml
  - certificate.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: auth-service-config
    behavior: merge
    literals:
      - SPRING_PROFILES_ACTIVE=prod

# Secrets are pre-created manually in the cluster — see DEPLOY.md
# Spring Cloud Kubernetes discovers them via label: secret.group

patches:
  - path: deployment-patch.yaml
  - path: networking-patch.yaml
  - patch: |-
      - op: replace
        path: /metadata/namespace
        value: istio-system
    target:
      kind: Certificate
