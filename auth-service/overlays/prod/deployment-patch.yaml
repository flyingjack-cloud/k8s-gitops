apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service-v1
spec:
  template:
    spec:
      containers:
        - name: auth-service
          image: 192.168.31.162:8443/cloud/flyingjack-auth-service:prod-latest
          imagePullPolicy: Always
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
