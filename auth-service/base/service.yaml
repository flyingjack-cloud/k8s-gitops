apiVersion: v1
kind: Service
metadata:
  name: auth-service
  labels:
    app: auth-service # 必须配置，ServiceMonitor会通过这个标签获取service
spec:
  selector:
    app: auth-service
  ports:
    - protocol: TCP
      name: http-web
      port: 80
      targetPort: api
    - protocol: TCP
      name: http-monitor
      port: 8081
      targetPort: actuator
  type: ClusterIP

