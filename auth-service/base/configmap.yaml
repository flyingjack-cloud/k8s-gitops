apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
data:
  SPRING_PROFILES_ACTIVE: "default"
  application.yml: |
    server:
      port: 8080

    spring:
      application:
        name: auth-service
      jackson:
        date-format: yyyy-MM-dd HH:mm:ss
        serialization:
          write-dates-as-timestamps: false
        time-zone: UTC
      messages:
        basename: i18n/message
        encoding: utf-8
      cloud:
        sentinel:
          eager: false
          transport:
            dashboard: ${SENTINEL_HOST:127.0.0.1}:8858

    feign:
      sentinel:
        enabled: true

    snowflake:
      datacenter-id: ${DATACENTER_ID:1}
      machine-id: ${MACHINE_ID:1}

    auth:
      cors:
        allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
      rsa:
        private-key: ${RSA_PRIVATE_KEY:}
      oauth2:
        gateway-client:
          client-id: ${OAUTH2_CLIENT_ID:sample-client}
          client-secret: ${OAUTH2_CLIENT_SECRET:sample-secret-dev}
          redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:4300/callback}

    springdoc:
      swagger-ui:
        enabled: false
      api-docs:
        enabled: false

    management:
      server:
        port: 8081
      endpoints:
        web:
          exposure:
            include: health, info, prometheus