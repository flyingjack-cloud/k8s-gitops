apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service-v1
  labels:
    app: auth-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
      version: v1
  template:
    metadata:
      labels:
        app: auth-service # 与上面matchLabels一致
        version: v1
    spec:
      serviceAccountName: auth-service-account
      containers:
        - name: auth-service
          image: auth-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
              name: api
            - containerPort: 8081
              protocol: TCP
              name: actuator
          env:
            # 从config中获取激活的profiles注入到env
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: SPRING_PROFILES_ACTIVE
            # 下面注入雪花id生成器需要的参数
            - name: DATACENTER_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: MACHINE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
      restartPolicy: Always
